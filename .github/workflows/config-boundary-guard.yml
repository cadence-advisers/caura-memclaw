name: Config boundary guard

# Runs the model-agnostic config-boundary guard (BP-7) on every PR and on
# every push to main. This is the REQUIRED check: it is intentionally fast
# and needs NO external services, so it can gate merges without flaking on
# infrastructure. The fuller test suite (DB-backed integration tests) runs
# separately in ci.yml. See docs/adr/0001-model-agnostic-config-boundary.md
# (section "CI enforcement") for what is and is not covered here.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: config-boundary-guard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config-boundary-guard:
    name: config-boundary-guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5.4.2
        with:
          version: "0.9.26"

      - name: Run the config-boundary guard (no DB / no external services)
        # --noconftest skips tests/conftest.py, whose session-scoped autouse
        # fixtures open a PostgreSQL connection for the integration suite. The
        # guard itself is pure AST/file scanning (stdlib + pytest only), so it
        # runs standalone and stays a fast, infra-free required check. The four
        # tests in this file prove BOTH that runtime source is clean AND that
        # the guard catches an injected hardcoded-model literal.
        run: >-
          uv run --no-project --python 3.13 --with pytest
          pytest tests/test_model_agnostic_config_boundary.py
          --noconftest -v --tb=short
